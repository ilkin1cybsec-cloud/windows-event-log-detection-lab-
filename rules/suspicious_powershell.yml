title: Suspicious PowerShell Execution
id: win-powershell-001
status: experimental
description: Detects PowerShell commands using encoded commands, bypass flags, or download cradle behavior.
author: SOC Portfolio Lab
logsource:
  product: windows
  service: security,powershell
detection:
  event_ids:
    - 4688
    - 4104
  process_names:
    - powershell.exe
    - pwsh.exe
  suspicious_keywords:
    - encodedcommand
    - -enc
    - executionpolicy bypass
    - downloadstring
    - iex
fields:
  - timestamp
  - hostname
  - username
  - process_name
  - command_line
falsepositives:
  - Administrative scripts
  - Software deployment tools
level: high
mitre:
  tactic: Execution
  technique_id: T1059.001
  technique: PowerShell
